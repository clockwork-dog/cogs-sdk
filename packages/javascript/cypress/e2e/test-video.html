<html>
  <head>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        overflow: hidden;
      }

      :root {
        --arrow-width: 30vmin;
        --arrow-height: 9vmin;
        --arrow-head-width: 9vmin;

        --time-radius: 15vmin;
        --time-arrow-size: 5vmin;
      }
      #arrows {
        position: absolute;
        overflow: visible;
        width: 100%;
        height: 100%;
      }
      .arrow {
        overflow: visible;
        translate: 0 -50%;
        position: absolute;
        background-color: black;
        width: var(--arrow-width);
        height: var(--arrow-height);
        display: inline-flex;
        align-items: center;
      }
      .arrow.top {
        top: 0;
      }
      .arrow.bottom {
        top: 100vh;
      }

      .arrow.left {
        left: calc(var(--arrow-head-width) - 1px);
      }
      .arrow.right {
        right: calc(var(--arrow-head-width) - 1px);
      }

      .arrow::after {
        content: "";
        position: absolute;
        width: 0;
        height: 0;
        border: var(--arrow-head-width) solid transparent;
      }

      .arrow.left::after {
        left: calc(1px + var(--arrow-head-width) * -1);
        border-right-color: black;
        border-left-width: 0;
      }

      .arrow.right::after {
        right: calc(1px + var(--arrow-head-width) * -1);
        border-left-color: black;
        border-right-width: 0;
      }

      main {
        position: absolute;
        height: 100%;
        width: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
      }

      #time {
        color: hsl(0, 100%, 50%);
        height: calc(var(--time-radius) * 2);
        width: calc(var(--time-radius) * 2);
        border-radius: 50%;
        background-color: currentColor;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      #seconds {
        color: black;
        font-family: monospace;
        font-size: calc(var(--time-radius) * 0.5);
      }

      #hand {
        position: absolute;
        height: 0;
        width: 0;
        border-color: transparent;
        border-top-color: currentColor;
        border-style: solid;
        border-width: var(--time-arrow-size) calc(var(--time-radius) * 0.3) 0
          calc(var(--time-radius) * 0.3);
        rotate: 20deg;
        transform: translateY(
          calc(var(--time-radius) * -1 + var(--time-arrow-size) * -0.5)
        );
      }
    </style>
  </head>

  <body>
    <div id="arrows">
      <div class="arrow left top"></div>
      <div class="arrow right top"></div>
      <div class="arrow left bottom"></div>
      <div class="arrow right bottom"></div>
    </div>
    <main>
      <div id="time">
        <span id="seconds">00.00</span>
        <span id="hand"></span>
      </div>
    </main>
    <script>
      const ARROW_LOOP_DURATION = 2_000;

      const url = new URL(globalThis.location);
      const arrows = document.getElementById("arrows");
      const time = document.getElementById("time");
      const seconds = document.getElementById("seconds");
      const hand = document.getElementById("hand");

      // Parse loop duration
      const loopQuery = url.searchParams.get(
        "loopDurationMs",
      );
      if (!loopQuery) {
        throw new Error(
          "Please specify loop duration in query string: ?loopDurationMs=1000",
        );
      }
      const loopDurationMs = parseFloat(loopQuery, 10);

      // Parse current time
      const currentQuery = url.searchParams.get(
        "currentMs",
      );
      currentMs = currentQuery ? parseFloat(currentQuery, 10) : NaN;

      function render(ms) {
        ms ??= 0;
        const loopProgress = (ms % loopDurationMs) / loopDurationMs;
        const arrowLoopProgress = (ms % ARROW_LOOP_DURATION) /
          ARROW_LOOP_DURATION;

        const arrowLoopProgressPercent = arrowLoopProgress * 100;
        const arrowLoopProgressPercentAroundMiddle =
          (arrowLoopProgressPercent - 50) % 100;

        const arrowTranslation =
          `0 ${arrowLoopProgressPercentAroundMiddle}vh`;
        arrows.style.translate = arrowTranslation;

        time.style.color = `hsl(${loopProgress * 360}, 90%, 60%)`;
        seconds.textContent = (ms / 1000)
          .toFixed(2)
          .padStart(5, "0");
        hand.style.rotate = `${loopProgress * 360}deg`;
      }

      if (Number.isFinite(currentMs)) {
        // Go to specified time
        render(currentMs);
      } else {
        // Loop
        function loop(ms) {
          render(ms);
          requestAnimationFrame(loop);
        }
        loop();
      }
    </script>
  </body>
</html>
